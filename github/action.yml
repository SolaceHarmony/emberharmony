name: "code-harmony GitHub Action"
description: "Run code-harmony in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/code-harmony,/oc'"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get code-harmony version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/sydneyrenee/code-harmony/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache code-harmony
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.code-harmony/bin
        key: code-harmony-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install code-harmony
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: CODE_HARMONY_INSTALL_DIR="$HOME/.code-harmony/bin" curl -fsSL https://raw.githubusercontent.com/sydneyrenee/code-harmony/main/install | bash

    - name: Add code-harmony to PATH
      shell: bash
      run: echo "$HOME/.code-harmony/bin" >> $GITHUB_PATH

    - name: Run code-harmony
      shell: bash
      id: run_code_harmony
      run: code-harmony github run
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        MENTIONS: ${{ inputs.mentions }}
