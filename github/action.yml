name: "emberharmony GitHub Action"
description: "Run emberharmony in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/emberharmony,/oc'"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get emberharmony version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/SolaceHarmony/emberharmony/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache emberharmony
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.emberharmony/bin
        key: emberharmony-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install emberharmony
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: EMBERHARMONY_INSTALL_DIR="$HOME/.emberharmony/bin" curl -fsSL https://raw.githubusercontent.com/SolaceHarmony/emberharmony/dev/install | bash

    - name: Add emberharmony to PATH
      shell: bash
      run: echo "$HOME/.emberharmony/bin" >> $GITHUB_PATH

    - name: Run emberharmony
      shell: bash
      id: run_emberharmony
      run: emberharmony github run
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        MENTIONS: ${{ inputs.mentions }}
