name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: package.json

    - name: Install dependencies
      if: runner.os != 'Windows'
      # Avoid bun's security scanner blocking CI publishes; the repo already has Dependabot alerts.
      run: cd "$GITHUB_WORKSPACE" && BUN_SECURITY_SCAN=0 bun install --config=packages/app/bunfig-ci.toml --verbose
      shell: bash

    - name: Install dependencies (windows)
      if: runner.os == 'Windows'
      run: |
        $root = $env:GITHUB_WORKSPACE
        Write-Host "workspace=$root"
        if (-not $root) { $root = (Get-Location).Path }
        $work = Join-Path $root "packages\\app"
        Write-Host "workdir=$work"
        Write-Host "package.json exists: $(Test-Path "$work\\package.json")"
        Set-Location $work
        bun install --config="$work\\bunfig-ci.toml" --backend=copyfile --verbose
      shell: pwsh
