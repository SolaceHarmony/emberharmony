name: test

on:
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: test (${{ matrix.settings.name }})
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            host: ubuntu-latest
            playwright: bunx playwright install --with-deps
            workdir: .
            command: |
              git config --global user.email "action@github.com"
              git config --global user.name "github-actions[bot]"
              bun turbo test
          - name: windows
            host: windows-latest
            playwright: bunx playwright install
            workdir: packages/app
            command: bun test:e2e:local
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install Playwright browsers
        working-directory: packages/app
        run: ${{ matrix.settings.playwright }}

      - name: Set OS-specific paths
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            printf '%s\n' "EMBERHARMONY_E2E_ROOT=${{ runner.temp }}\\emberharmony-e2e" >> "$GITHUB_ENV"
            printf '%s\n' "EMBERHARMONY_TEST_HOME=${{ runner.temp }}\\emberharmony-e2e\\home" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_DATA_HOME=${{ runner.temp }}\\emberharmony-e2e\\share" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_CACHE_HOME=${{ runner.temp }}\\emberharmony-e2e\\cache" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_CONFIG_HOME=${{ runner.temp }}\\emberharmony-e2e\\config" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_STATE_HOME=${{ runner.temp }}\\emberharmony-e2e\\state" >> "$GITHUB_ENV"
          else
            printf '%s\n' "EMBERHARMONY_E2E_ROOT=${{ runner.temp }}/emberharmony-e2e" >> "$GITHUB_ENV"
            printf '%s\n' "EMBERHARMONY_TEST_HOME=${{ runner.temp }}/emberharmony-e2e/home" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_DATA_HOME=${{ runner.temp }}/emberharmony-e2e/share" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_CACHE_HOME=${{ runner.temp }}/emberharmony-e2e/cache" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_CONFIG_HOME=${{ runner.temp }}/emberharmony-e2e/config" >> "$GITHUB_ENV"
            printf '%s\n' "XDG_STATE_HOME=${{ runner.temp }}/emberharmony-e2e/state" >> "$GITHUB_ENV"
          fi

      - name: Seed EmberHarmony data
        if: matrix.settings.name != 'windows'
        working-directory: packages/emberharmony
        run: bun script/seed-e2e.ts
        env:
          EMBERHARMONY_DISABLE_SHARE: "true"
          EMBERHARMONY_DISABLE_LSP_DOWNLOAD: "true"
          EMBERHARMONY_DISABLE_DEFAULT_PLUGINS: "true"
          EMBERHARMONY_EXPERIMENTAL_DISABLE_FILEWATCHER: "true"
          EMBERHARMONY_TEST_HOME: ${{ env.EMBERHARMONY_TEST_HOME }}
          XDG_DATA_HOME: ${{ env.XDG_DATA_HOME }}
          XDG_CACHE_HOME: ${{ env.XDG_CACHE_HOME }}
          XDG_CONFIG_HOME: ${{ env.XDG_CONFIG_HOME }}
          XDG_STATE_HOME: ${{ env.XDG_STATE_HOME }}
          EMBERHARMONY_E2E_PROJECT_DIR: ${{ github.workspace }}
          EMBERHARMONY_E2E_SESSION_TITLE: "E2E Session"
          EMBERHARMONY_E2E_MESSAGE: "Seeded for UI e2e"
          EMBERHARMONY_E2E_MODEL: "mock/mock-model"

      - name: Run EmberHarmony server
        if: matrix.settings.name != 'windows'
        working-directory: packages/emberharmony
        run: bun dev -- --print-logs --log-level WARN serve --port 4096 --hostname 127.0.0.1 &
        env:
          EMBERHARMONY_DISABLE_SHARE: "true"
          EMBERHARMONY_DISABLE_LSP_DOWNLOAD: "true"
          EMBERHARMONY_DISABLE_DEFAULT_PLUGINS: "true"
          EMBERHARMONY_EXPERIMENTAL_DISABLE_FILEWATCHER: "true"
          EMBERHARMONY_TEST_HOME: ${{ env.EMBERHARMONY_TEST_HOME }}
          XDG_DATA_HOME: ${{ env.XDG_DATA_HOME }}
          XDG_CACHE_HOME: ${{ env.XDG_CACHE_HOME }}
          XDG_CONFIG_HOME: ${{ env.XDG_CONFIG_HOME }}
          XDG_STATE_HOME: ${{ env.XDG_STATE_HOME }}
          EMBERHARMONY_CLIENT: "app"

      - name: Wait for EmberHarmony server
        if: matrix.settings.name != 'windows'
        run: |
          for i in {1..120}; do
            curl -fsS "http://127.0.0.1:4096/global/health" > /dev/null && exit 0
            sleep 1
          done
          exit 1

      - name: run
        working-directory: ${{ matrix.settings.workdir }}
        run: ${{ matrix.settings.command }}
        env:
          CI: true
          EMBERHARMONY_DISABLE_SHARE: "true"
          EMBERHARMONY_DISABLE_LSP_DOWNLOAD: "true"
          EMBERHARMONY_DISABLE_DEFAULT_PLUGINS: "true"
          EMBERHARMONY_EXPERIMENTAL_DISABLE_FILEWATCHER: "true"
          EMBERHARMONY_TEST_HOME: ${{ env.EMBERHARMONY_TEST_HOME }}
          XDG_DATA_HOME: ${{ env.XDG_DATA_HOME }}
          XDG_CACHE_HOME: ${{ env.XDG_CACHE_HOME }}
          XDG_CONFIG_HOME: ${{ env.XDG_CONFIG_HOME }}
          XDG_STATE_HOME: ${{ env.XDG_STATE_HOME }}
          PLAYWRIGHT_SERVER_HOST: "127.0.0.1"
          PLAYWRIGHT_SERVER_PORT: "4096"
          VITE_EMBERHARMONY_SERVER_HOST: "127.0.0.1"
          VITE_EMBERHARMONY_SERVER_PORT: "4096"
          EMBERHARMONY_CLIENT: "app"
        timeout-minutes: 30

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-${{ matrix.settings.name }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            packages/app/e2e/test-results
            packages/app/e2e/playwright-report
