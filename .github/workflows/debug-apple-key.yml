name: Debug Apple API Key

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: macos-latest
    steps:
      - name: Check if APPLE_API_KEY is base64
        run: |
          set -euo pipefail
          KEY="${APPLE_API_KEY}"
          echo "Key length: ${#KEY}"
          echo "First 20 chars: ${KEY:0:20}"
          echo "Last 20 chars: ${KEY: -20}"
          echo "---"
          # Try base64 decode
          if printf '%s' "$KEY" | base64 --decode > /tmp/decoded.p8 2>/dev/null; then
            echo "Is base64: true"
            echo "Decoded first line: $(head -1 /tmp/decoded.p8)"
            echo "Decoded last line: $(tail -1 /tmp/decoded.p8)"
          else
            echo "Is base64: false"
            echo "First line: $(printf '%s' "$KEY" | head -1)"
            echo "Last line: $(printf '%s' "$KEY" | tail -1)"
          fi
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}