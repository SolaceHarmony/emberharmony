name: CI
run-name: CI ${{ github.ref_name }} @ ${{ github.sha }}

# Verification builds. Runs the full 5-target CLI + Tauri matrix on every push
# to an integration branch (i.e. after a PR merges). Does NOT run on pull_request
# — that keeps the expensive matrix off PR review and away from fork secrets.

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

# Every merge commit deserves its own verification — do not cancel in progress.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  # No version job: artifacts carry the version from packages/emberharmony/package.json
  # at build time. release and tag are omitted, so _build.yml produces workflow
  # artifacts only — no GitHub release attachment, and nothing commits, tags, or pushes.
  build:
    uses: ./.github/workflows/_build.yml
    secrets: inherit
