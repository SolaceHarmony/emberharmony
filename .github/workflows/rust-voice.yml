name: Native voice (Flashkern/kcoro)
run-name: native-voice ${{ github.ref_name }} @ ${{ github.sha }}

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "crates/kcoro-sys/**"
      - "crates/liquid-audio/**"
      - "crates/liquid-audio-oracle/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/rust-voice.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-voice-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: native build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        run: rustup update stable && rustup default stable && rustc -V

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test kcoro coordination substrate
        run: cargo test -p kcoro-sys --tests -- --nocapture

      - name: Build native voice targets
        run: cargo build -p liquid-audio --all-targets

      - name: Test native voice library
        run: cargo test -p liquid-audio --lib -- --nocapture

      - name: Test native voice integration gates
        run: cargo test -p liquid-audio --tests -- --nocapture

      - name: Compile hidden oracle ABI
        run: cargo check -p liquid-audio --features oracle-abi

      # The ignored real-checkpoint truth gate is intentionally not made
      # vacuous in generic CI. Release automation must provision the model and
      # question.wav, invoke the exact ignored test, and retain its WAV/manifest
      # artifacts.
