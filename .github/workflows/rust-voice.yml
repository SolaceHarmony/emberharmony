name: Rust voice (liquid-audio-rs)
run-name: rust-voice ${{ github.ref_name }} @ ${{ github.sha }}

# Formalizes the liquid-audio-rs test suite in the build: every change to the crate
# (or this workflow) builds + runs `cargo test` on both x86_64 Linux and arm64 macOS.
# The macOS arm64 runner is where the hardware-specific paths actually execute — the
# NEON BFMMLA bf16 GEMM kernel (FEAT_BF16) and the torch-parity intra-op thread policy
# (`hw.perflevel0.physicalcpu`); on Linux those self-skip / fall back to physical cores,
# so the run still proves the cfg fallbacks compile and the portable tests pass.

on:
  # PR-only (plus manual): the bare `push:` trigger fired on every commit to any branch,
  # duplicating the pull_request run. PRs into dev/main already gate the crate.
  pull_request:
    branches: [dev, main]
    paths:
      - "crates/liquid-audio/**"
      - "crates/candle-flashfftconv/**"
      - "crates/kcoro-sys/**"
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/rust-voice.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-voice-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: crates/liquid-audio

jobs:
  test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest] # macos-latest is arm64 → real BFMMLA + perflevel0
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        run: rustup update stable && rustup default stable && rustc -V

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      # cpal (dev-dep, used by the mic_chat example/tests) needs ALSA headers on Linux.
      - name: Linux audio deps (cpal/ALSA)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # The link-only build used to leave kcoro's Cargo integration tests dormant.
      # Execute the production ticket and expected-value wait adapters on both hosts.
      - name: Test kcoro sys crate
        run: cargo test -p kcoro-sys --tests -- --nocapture

      - name: Build (lib + examples + tests)
        run: cargo build --all-targets

      - name: Test (library)
        run: cargo test --lib -- --nocapture

      # `cargo build --all-targets` only proves that integration binaries compile.
      # Execute the hermetic integration suite; checkpoint/hardware e2e gates are
      # explicitly `ignored` and have dedicated invocation commands in their files.
      - name: Test (integration)
        run: cargo test --tests -- --nocapture

      # macOS only: the Accelerate (vecLib BLAS) CPU-matmul path is the torch backend on
      # Apple Silicon. Compile-check it so the feature wiring can't rot unnoticed.
      - name: Compile-check Accelerate feature (macOS)
        if: runner.os == 'macOS'
        run: cargo build --lib --features accelerate

      # macOS only: the DEPLOYED numerics are bf16 Metal — the desktop app builds
      # liquid-audio with `features=["metal"]`, and the flashfftconv Metal kernels
      # (ShortConv's conv path — every backbone token) previously compiled in CI but
      # were never EXECUTED. GitHub's arm64 macOS runners have a real Metal device;
      # run the lib tests on it so the shipped code path is tested, not just built.
      - name: Test (lib, Metal — the shipped code path)
        if: runner.os == 'macOS'
        run: cargo test --lib --features metal -- --nocapture

      - name: Test (integration, Metal)
        if: runner.os == 'macOS'
        run: cargo test --tests --features metal -- --nocapture
