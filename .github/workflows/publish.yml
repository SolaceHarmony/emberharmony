name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write
  actions: read

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev' && (inputs.bump || inputs.version)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ github.token }}
          CODE_HARMONY_PUBLISH_NAME: @thesolaceproject/code-harmony
          CODE_HARMONY_BUMP: ${{ inputs.bump }}
          CODE_HARMONY_VERSION: ${{ inputs.version }}
          CODE_HARMONY_API_KEY: ${{ secrets.CODE_HARMONY_API_KEY }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli:
    needs: version
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev' && (inputs.bump || inputs.version)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build
        id: build
        run: |
          ./packages/code-harmony/script/build.ts
        env:
          CODE_HARMONY_VERSION: ${{ needs.version.outputs.version }}
          CODE_HARMONY_RELEASE: ${{ needs.version.outputs.release }}
          CODE_HARMONY_PUBLISH_NAME: @thesolaceproject/code-harmony
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@v4
        with:
          name: code-harmony-cli
          path: packages/code-harmony/dist

    outputs:
      version: ${{ needs.version.outputs.version }}

  build-tauri:
    if: github.ref_name == 'dev' && (inputs.bump || inputs.version)
    needs:
      - build-cli
      - version
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.settings.host }}
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: apple-actions/import-codesign-certs@v3
        if: ${{ runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' }}
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify Certificate
        if: ${{ runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' }}
        run: |
          set -euo pipefail

          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "CERT_ID=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

            TEAM_ID=$(echo "$APPLE_SIGNING_IDENTITY" | sed -n 's/.*(\([A-Z0-9]\{10\}\)).*/\1/p')
            if [ -n "${TEAM_ID:-}" ]; then
              echo "APPLE_TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
              echo "Using APPLE_TEAM_ID from signing identity: $TEAM_ID"
            fi

            echo "Using APPLE_SIGNING_IDENTITY override."
            security find-identity -v -p codesigning build.keychain | cat
            exit 0
          fi

          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1 || true)
          if [ -z "$CERT_INFO" ]; then
            echo "No 'Developer ID Application' identity found in build.keychain" >&2
            security find-identity -v -p codesigning build.keychain | cat
            exit 1
          fi

          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> "$GITHUB_ENV"
          echo "Certificate imported: $CERT_ID"

          TEAM_ID=$(echo "$CERT_ID" | sed -n 's/.*(\([A-Z0-9]\{10\}\)).*/\1/p')
          if [ -n "${TEAM_ID:-}" ]; then
            echo "APPLE_TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
            echo "Detected APPLE_TEAM_ID from certificate: $TEAM_ID"
          fi

      - name: Setup Apple API Key
        if: ${{ runner.os == 'macOS' && env.APPLE_API_KEY_PATH != '' }}
        run: |
          printf '%s' "${{ secrets.APPLE_API_KEY_PATH }}" > "$RUNNER_TEMP/apple-api-key.p8"

      - uses: ./.github/actions/setup-bun

      - name: Cache apt packages
        if: contains(matrix.settings.host, 'ubuntu')
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          key: ${{ runner.os }}-${{ matrix.settings.target }}-apt-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.settings.target }}-apt-

      - name: install dependencies (ubuntu only)
        if: contains(matrix.settings.host, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.settings.target }}

      - name: Prepare
        run: |
          cd packages/desktop
          bun ./scripts/prepare.ts
        env:
          CODE_HARMONY_VERSION: ${{ needs.version.outputs.version }}
          GITHUB_TOKEN: ${{ github.token }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      # Fixes AppImage build issues, can be removed when https://github.com/tauri-apps/tauri/pull/12491 is released
      - name: Install tauri-cli from portable appimage branch
        if: contains(matrix.settings.host, 'ubuntu')
        run: |
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --force
          echo "Installed tauri-cli version:"
          cargo tauri --version

      - name: Export Apple ID notarization credentials
        if: ${{ runner.os == 'macOS' }}
        run: |
          APPLE_ID="${{ secrets.APPLE_ID }}"
          APPLE_PASSWORD="${{ secrets.APPLE_PASSWORD }}"

          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ]; then
            echo "Apple ID notarization not configured; using App Store Connect API key."
            exit 0
          fi

          echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"

      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
        timeout-minutes: 60
        if: ${{ runner.os != 'macOS' || (env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '') }}
        with:
          projectPath: packages/desktop
          uploadWorkflowArtifacts: true
          tauriScript: ${{ (contains(matrix.settings.host, 'ubuntu') && 'cargo tauri') || '' }}
          args: --target ${{ matrix.settings.target }} --config ./src-tauri/tauri.prod.conf.json --verbose
          updaterJsonPreferNsis: true
          releaseId: ${{ needs.version.outputs.release }}
          tagName: ${{ needs.version.outputs.tag }}
          releaseDraft: true
          releaseAssetNamePattern: code-harmony-desktop-[platform]-[arch][ext]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}

  publish:
    if: github.repository == 'SolaceHarmony/code-harmony'
    needs:
      - version
      - build-cli
    runs-on: ubuntu-latest
    env:
      AUR_KEY: ${{ secrets.AUR_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer

      - uses: actions/download-artifact@v4
        with:
          name: code-harmony-cli
          path: packages/code-harmony/dist

      - name: Verify CLI artifact
        run: |
          set -euo pipefail
          ls -la packages/code-harmony/dist
          test -f packages/code-harmony/dist/code-harmony-linux-x64/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-linux-arm64/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-linux-x64-baseline/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-linux-x64-musl/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-linux-x64-baseline-musl/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-linux-arm64-musl/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-darwin-x64/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-darwin-x64-baseline/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-darwin-arm64/bin/code-harmony
          test -f packages/code-harmony/dist/code-harmony-windows-x64/bin/code-harmony.exe
          test -f packages/code-harmony/dist/code-harmony-windows-x64-baseline/bin/code-harmony.exe

      - name: Cache apt packages (AUR)
        if: ${{ env.AUR_KEY != '' }}
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          key: ${{ runner.os }}-apt-aur-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-aur-

      - name: Setup SSH for AUR
        if: ${{ env.AUR_KEY != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pacman-package-manager
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions[bot]"
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts || true

      - run: ./script/publish.ts
        env:
          CODE_HARMONY_VERSION: ${{ needs.version.outputs.version }}
          CODE_HARMONY_RELEASE: ${{ needs.version.outputs.release }}
          CODE_HARMONY_PUBLISH_NAME: @thesolaceproject/code-harmony
          CODE_HARMONY_PUBLISH_PLATFORMS: "1"
          CODE_HARMONY_SKIP_GIT: "1"
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GITHUB_TOKEN: ${{ steps.committer.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: false
