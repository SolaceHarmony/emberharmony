name: Publish
run-name: ${{ github.event.release.tag_name }}

# Publishing is driven solely by a published GitHub release (a human cuts the
# release and its tag from the GitHub UI — CI never creates tags or releases).
# The default GITHUB_TOKEN stays read-only per enterprise policy. The single
# repository write — attaching the built binaries to the human-created release —
# is performed by the attach-assets job below using RELEASE_ASSETS_TOKEN, a
# fine-grained PAT scoped to contents:write on this repository only. The npm
# publish targets the external npm registry and uses NPM_TOKEN.
on:
  release:
    types: [published]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  actions: read

jobs:
  # The human-controlled pre-release checkbox IS the channel selector:
  # pre-release → dev channel, stable → main channel. It cannot be derived
  # from release.target_commitish (GitHub documents that field as unused when
  # a release is cut from an existing tag — it then reports the default
  # branch) nor from tag-commit ancestry alone (after a dev→main merge, dev
  # commits are reachable from main too). The ancestry check below is the
  # safety net for the checkbox: a stable release whose tag is not on main —
  # e.g. someone cut a stable release from the dev tip — refuses to build,
  # because it would become GitHub's /releases/latest, the target of every
  # stable curl install and update check.
  validate:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive channel from the pre-release flag; stable must come from main
        id: channel
        env:
          TAG: ${{ github.event.release.tag_name }}
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          commit=$(git rev-list -n1 "refs/tags/$TAG")
          if [ "$PRERELEASE" = "true" ]; then
            channel=dev
          else
            channel=main
            if ! git merge-base --is-ancestor "$commit" origin/main; then
              echo "::error::Stable release $TAG ($commit) is not reachable from main. Stable releases must be cut from main; for a dev build, recreate the release with the pre-release checkbox set."
              exit 1
            fi
          fi
          echo "tag=$TAG commit=$commit channel=$channel prerelease=$PRERELEASE — ok"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

  build:
    needs:
      - validate
    uses: ./.github/workflows/_build.yml
    with:
      release: ${{ github.event.release.id }}
      tag: ${{ github.event.release.tag_name }}
      # The branch the tag's commit actually belongs to, resolved by the
      # validate job (release.target_commitish is unreliable for releases cut
      # from existing tags). main → stable ("latest"), dev → dev channel.
      target: ${{ needs.validate.outputs.channel }}
      release-notes: ${{ github.event.release.body }}
      publish-name: "@thesolaceproject/emberharmony"
    secrets: inherit

  # Attach built archives (CLI + desktop) to the release. Runs for stable
  # releases AND pre-releases — a dev build still ships its binaries on the
  # release page.
  attach-assets:
    if: ${{ github.repository == 'SolaceHarmony/emberharmony' }}
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: emberharmony-cli
          path: dist

      - uses: actions/download-artifact@v8
        with:
          pattern: emberharmony-desktop-*
          path: desktop
          merge-multiple: true
        continue-on-error: true

      - name: Rename desktop bundles for consistent download URLs
        run: |
          cd desktop 2>/dev/null || exit 0
          # Tauri produces names like EmberHarmony_1.3.0_aarch64.dmg;
          # the download page expects emberharmony-desktop-darwin-aarch64.dmg etc.
          for f in EmberHarmony_*_aarch64.dmg;          do [ -f "$f" ] && mv "$f" "emberharmony-desktop-darwin-aarch64.dmg";       done
          for f in EmberHarmony_*_x64-setup.exe;        do [ -f "$f" ] && mv "$f" "emberharmony-desktop-windows-x64.exe";          done
          for f in EmberHarmony_*_amd64.deb;            do [ -f "$f" ] && mv "$f" "emberharmony-desktop-linux-amd64.deb";           done
          for f in EmberHarmony_*_amd64.AppImage;      do [ -f "$f" ] && mv "$f" "emberharmony-desktop-linux-amd64.AppImage";      done
          for f in EmberHarmony_*.x86_64.rpm;           do [ -f "$f" ] && mv "$f" "emberharmony-desktop-linux-x86_64.rpm";          done
          for f in EmberHarmony_*_arm64.deb;            do [ -f "$f" ] && mv "$f" "emberharmony-desktop-linux-arm64.deb";           done
          for f in EmberHarmony_*_arm64.AppImage;       do [ -f "$f" ] && mv "$f" "emberharmony-desktop-linux-arm64.AppImage";      done
          for f in EmberHarmony_*.aarch64.rpm;          do [ -f "$f" ] && mv "$f" "emberharmony-desktop-linux-arm64.rpm";           done

      - name: Attach archives to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          ls -la dist
          ls -la desktop 2>/dev/null || echo "No desktop artifacts found"
          gh release upload "$TAG" dist/*.tar.gz dist/*.zip dist/*.sha256 \
            --clobber --repo "${{ github.repository }}"
          if ls desktop/*.* 2>/dev/null; then
            gh release upload "$TAG" desktop/*.* \
              --clobber --repo "${{ github.repository }}"
          fi

  # npm publish runs ONLY for stable main-channel releases, and only after the
  # GitHub release assets are attached — an npm package must never point at a
  # release whose binaries failed to upload. A dev or pre-release build still
  # ships binaries to the release page via attach-assets, but never touches npm.
  publish:
    if: ${{ github.repository == 'SolaceHarmony/emberharmony' && !github.event.release.prerelease && needs.validate.outputs.channel == 'main' }}
    needs:
      - validate
      - build
      - attach-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v8
        with:
          name: emberharmony-cli
          path: packages/emberharmony/dist

      - name: Verify CLI artifact
        run: |
          set -euo pipefail
          ls -la packages/emberharmony/dist
          test -f packages/emberharmony/dist/emberharmony-linux-x64/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-linux-arm64/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-linux-x64-baseline/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-linux-x64-musl/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-linux-x64-baseline-musl/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-linux-arm64-musl/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-darwin-x64/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-darwin-x64-baseline/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-darwin-arm64/bin/emberharmony
          test -f packages/emberharmony/dist/emberharmony-windows-x64/bin/emberharmony.exe
          test -f packages/emberharmony/dist/emberharmony-windows-x64-baseline/bin/emberharmony.exe

      - run: ./script/publish.ts
        env:
          EMBERHARMONY_RELEASE: ${{ github.event.release.id }}
          EMBERHARMONY_TARGET: ${{ needs.validate.outputs.channel }}
          EMBERHARMONY_PUBLISH_NAME: "@thesolaceproject/emberharmony"
          EMBERHARMONY_PUBLISH_PLATFORMS: "1"
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: false
