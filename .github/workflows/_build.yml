name: Build
run-name: Build ${{ inputs.tag || github.sha }}

# Reusable workflow that produces the CLI binaries and Tauri desktop bundles.
# Called by:
#   - ci.yml     (post-merge verification on dev/main; uploads workflow artifacts only)
#   - publish.yml (release publish; uploads CLI archives to the published GitHub release
#                  and desktop bundles via attach-assets)
#
# When inputs.release and inputs.tag are empty strings, tauri-action skips
# release attachment and only produces workflow artifacts. See:
# https://github.com/tauri-apps/tauri-action#workflow-inputs

on:
  workflow_call:
    inputs:
      release:
        description: "GitHub release ID to attach artifacts to. Empty = workflow artifacts only."
        type: string
        default: ""
      tag:
        description: "Git tag name for the release (e.g. v1.2.3). Sculpts the archive filenames. Empty in CI."
        type: string
        default: ""
      target:
        description: "Branch the release targets (main or dev). Determines the channel. Empty in CI."
        type: string
        default: ""
      release-notes:
        description: "Human-written release notes, bundled into each archive as RELEASE_NOTES.md. Optional."
        type: string
        default: ""
      publish-name:
        description: "Scoped npm package name embedded in the CLI build."
        type: string
        default: "@thesolaceproject/emberharmony"

# Permissions are inherited from the caller. Both callers grant read-only:
# this build never mutates the repository (no commit, tag, push, or release
# upload). The CLI binaries and desktop bundles are surfaced as workflow artifacts.

jobs:
  build-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build CLI binaries
        id: build
        run: |
          ./packages/emberharmony/script/build.ts
        env:
          EMBERHARMONY_RELEASE: ${{ inputs.release }}
          EMBERHARMONY_TAG: ${{ inputs.tag }}
          EMBERHARMONY_TARGET: ${{ inputs.target }}
          EMBERHARMONY_RELEASE_NOTES: ${{ inputs.release-notes }}
          EMBERHARMONY_PUBLISH_NAME: ${{ inputs.publish-name }}

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: emberharmony-cli
          path: packages/emberharmony/dist

  build-tauri:
    needs: build-cli
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Cache apt packages
        if: contains(matrix.settings.host, 'ubuntu')
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: ${{ runner.os }}-${{ matrix.settings.target }}-apt-${{ hashFiles('.github/workflows/_build.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.settings.target }}-apt-

      - name: Install dependencies (ubuntu only)
        if: contains(matrix.settings.host, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.settings.target }}

      - name: Add Rust cross-compilation target
        run: rustup target add ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.settings.target }}

      - name: Prepare
        run: |
          cd packages/desktop
          bun ./scripts/prepare.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          EMBERHARMONY_RELEASE: ${{ inputs.release }}
          EMBERHARMONY_TARGET: ${{ inputs.target }}

      - name: Write Apple API key
        if: runner.os == 'macOS'
        shell: bash
        run: printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8

      # Assemble the self-contained voice runtime (bun + agent.js + node_modules
      # + models) that the desktop app ships as a Tauri resource. The runner's
      # host platform matches the matrix target, so the script's host
      # auto-detection produces the correct per-platform bundle.
      - name: Assemble voice runtime
        run: |
          cd packages/desktop
          bun ./scripts/build-voice-runtime.ts

      # Sign the voice runtime's nested native libs (.node/.dylib) with the
      # Developer ID cert + a secure timestamp, BEFORE tauri-action assembles
      # and notarizes the app — tauri seals resource code without re-signing it,
      # so unsigned nested binaries otherwise fail notarization. Uses a throwaway
      # keychain; the bundled `bun` is left as oven-sh shipped it.
      - name: Sign bundled voice runtime binaries
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/voice-sign.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT="$RUNNER_TEMP/voice-cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT"
          security import "$CERT" -P "$APPLE_CERTIFICATE_PASSWORD" -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Prepend the keychain to the search list so codesign resolves the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          # APPLE_SIGNING_IDENTITY is unset in this repo — tauri-action auto-derives
          # it from the imported cert, so we must too, or the signer silently skips
          # (which is exactly what shipped unsigned nested binaries to notarization).
          IDENTITY="${APPLE_SIGNING_IDENTITY:-}"
          if [ -z "$IDENTITY" ] || [ "$IDENTITY" = "-" ]; then
            IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | sed -nE 's/^[[:space:]]*[0-9]+\)[[:space:]]+[0-9A-F]+[[:space:]]+"(Developer ID Application: .*)"$/\1/p' | head -1)"
          fi
          if [ -z "$IDENTITY" ]; then
            echo "::error::no Developer ID Application identity in the signing keychain"; exit 1
          fi
          echo "Signing voice runtime with identity: $IDENTITY"
          bun packages/desktop/scripts/sign-voice-runtime.ts --identity "$IDENTITY" --keychain "$KEYCHAIN"
          rm -f "$CERT"

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0.6.2
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop
          # Linux ships deb + rpm only. AppImage bundling stalls on x64 (hangs on
          # the AppImage runtime/FUSE step with no timeout → 60-min build timeout)
          # and isn't in the configured bundle.targets anyway; pin --bundles so it
          # can never be attempted.
          args: ${{ contains(matrix.settings.host, 'ubuntu') && '--bundles deb,rpm ' || '' }}--target ${{ matrix.settings.target }} --config ./src-tauri/tauri.prod.conf.json
          updaterJsonPreferNsis: true

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: emberharmony-desktop-${{ matrix.settings.target }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/**/*
            packages/desktop/src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*
