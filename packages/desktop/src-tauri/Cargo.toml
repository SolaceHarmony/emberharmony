[package]
name = "emberharmony-desktop"
version = "0.0.0"
description = "The open source AI coding agent (The Solace Project)"
authors = ["Sydney Renee"]
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "emberharmony_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-deep-link = "2.4.6"
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tauri-plugin-store = "2"
tauri-plugin-window-state = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-http = "2.5.6"
tauri-plugin-notification = "2"
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
crossbeam-channel = "0.5"
tokio = { version = "1.48.0", features = ["sync", "macros"] }
listeners = "0.3"
tauri-plugin-os = "2"
futures = "0.3.31"
semver = "1.0.27"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }
uuid = { version = "1.19.0", features = ["v4"] }
tauri-plugin-decorum = "1.1.1"
comrak = { version = "0.50", default-features = false }
# HF token storage in the OS keychain (macOS Keychain / Windows Credential Manager /
# Linux Secret Service). The token never lands in the settings JSON — see voice::model.
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
livekit = { version = "0.7.49", features = ["rustls-tls-webpki-roots"] }
# libwebrtc 0.3.38 is not compatible with webrtc-sys 0.3.36's packet metadata ABI.
# Keep this exact until LiveKit publishes a libwebrtc that forwards `user_data`.
webrtc-sys = "=0.3.35"
livekit-api = { version = "0.5.4", default-features = false, features = ["access-token", "services-tokio", "rustls-tls-webpki-roots"] }
livekit-protocol = "0.7.10"

[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = "=2.0.2"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-web-kit = "0.3"
window-vibrancy = "0.7"
# Native Flashkern voice lifecycle and PCM dock. Candle/Metal is oracle-only and
# is deliberately absent from the shipped desktop dependency graph.
liquid-audio = { path = "../../../crates/liquid-audio" }

# Linux CPU build of the same native runtime. Windows/MSVC is intentionally not a
# release target until kcoro and flashkern have a real Windows port.
[target.'cfg(not(target_os = "macos"))'.dependencies]
liquid-audio = { path = "../../../crates/liquid-audio" }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
    "Win32_Security"
] }

[profile.release]
codegen-units = 16
lto = false
incremental = false
