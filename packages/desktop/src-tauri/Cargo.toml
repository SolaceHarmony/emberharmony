[package]
name = "emberharmony-desktop"
version = "0.0.0"
description = "The open source AI coding agent (The Solace Project)"
authors = ["Sydney Renee"]
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "emberharmony_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-deep-link = "2.4.6"
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tauri-plugin-store = "2"
tauri-plugin-window-state = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-http = "2.5.6"
tauri-plugin-notification = "2"
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1.48.0"
listeners = "0.3"
tauri-plugin-os = "2"
futures = "0.3.31"
semver = "1.0.27"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
uuid = { version = "1.19.0", features = ["v4"] }
tauri-plugin-decorum = "1.1.1"
comrak = { version = "0.50", default-features = false }

[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = "=2.0.2"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-web-kit = "0.3"
window-vibrancy = "0.7"
# The native voice engine (pure-Rust LFM2-Audio realtime pipeline) compiled INTO the
# desktop binary — capture → model → playback runs in-process on real OS threads (the
# `RealtimePipeline` worker), driven directly by the `voice_start` Tauri command, with no
# Bun/Node sidecar. On Apple Silicon the `metal` feature gives bf16 GPU generation =
# real-time. See `crates/liquid-audio` (moved here from experiments/lfm2-audio-voice).
liquid-audio = { path = "crates/liquid-audio", features = ["metal"] }

# Same engine on non-macOS, CPU path (no Metal); below real-time for a 1.5B model but
# keeps the desktop building everywhere.
[target.'cfg(not(target_os = "macos"))'.dependencies]
liquid-audio = { path = "crates/liquid-audio" }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
    "Win32_Security"
] }

[profile.release]
codegen-units = 16
lto = false
incremental = false
