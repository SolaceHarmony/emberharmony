[package]
name = "emberharmony-desktop"
version = "0.0.0"
description = "The open source AI coding agent (The Solace Project)"
authors = ["Sydney Renee"]
edition = "2024"
default-run = "emberharmony-desktop"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "emberharmony_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-deep-link = "2.4.6"
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tauri-plugin-store = "2"
tauri-plugin-window-state = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-http = "2.5.6"
tauri-plugin-notification = "2"
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.48.0", features = ["sync", "rt-multi-thread", "macros", "time", "signal"] }
# OS audio device I/O (mic capture + speaker playback) for the native voice
# client. cpal streams are !Send, so they live on dedicated threads.
cpal = { version = "0.15", optional = true }
# Acoustic echo cancellation (+ noise suppression + AGC) for the native mic
# path — WebRTC AEC3 port. Without this the agent hears itself via the
# speakers and barges in on its own speech. linear pipeline = HPF→AEC3→NS→AGC2.
aec3 = { version = "0.3", optional = true }
# Bounded channel for cpal→AEC thread communication — never blocks in audio
# callbacks, matches the aec3 crate's reference examples.
crossbeam-channel = { version = "0.5", optional = true }
listeners = "0.3"
tauri-plugin-os = "2"
futures = "0.3.31"
semver = "1.0.27"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
uuid = { version = "1.19.0", features = ["v4"] }
tauri-plugin-decorum = "1.1.1"
comrak = { version = "0.50", default-features = false }

# LiveKit Rust SDK — native audio transport for voice sessions.
# native-tls is required for wss:// connections to LiveKit Cloud.
livekit = { version = "0.7", optional = true, features = ["native-tls"] }
livekit-api = { version = "0.5", optional = true }
log = "0.4"
env_logger = "0.11"

[features]
default = ["voice"]
voice = ["livekit", "livekit-api", "cpal", "aec3", "crossbeam-channel"]

# Standalone headless native voice client: connects to a LiveKit room and
# bridges the OS mic/speakers via cpal — no webview, no Tauri window. Run with:
#   cargo run --bin voice-native --features voice
[[bin]]
name = "voice-native"
path = "src/bin/voice_native.rs"
required-features = ["voice"]

[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = "=2.0.2"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-web-kit = "0.3"
window-vibrancy = "0.7"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
    "Win32_Security"
] }
