id = "emberharmony"
name = "EmberHarmony"
description = "The open source coding agent."
version = "1.0.0"
schema_version = 1
authors = ["The Solace Project"]
repository = "https://github.com/SolaceHarmony/emberharmony"

[agent_servers.emberharmony]
name = "EmberHarmony"
icon = "./icons/emberharmony.svg"

[agent_servers.emberharmony.targets.darwin-aarch64]
archive = "https://github.com/SolaceHarmony/emberharmony/releases/download/v1.0.0/emberharmony-darwin-arm64.zip"
cmd = "./emberharmony"
args = ["acp"]

[agent_servers.emberharmony.targets.darwin-x86_64]
archive = "https://github.com/SolaceHarmony/emberharmony/releases/download/v1.0.0/emberharmony-darwin-x64.zip"
cmd = "./emberharmony"
args = ["acp"]

[agent_servers.emberharmony.targets.linux-aarch64]
archive = "https://github.com/SolaceHarmony/emberharmony/releases/download/v1.0.0/emberharmony-linux-arm64.tar.gz"
cmd = "./emberharmony"
args = ["acp"]

[agent_servers.emberharmony.targets.linux-x86_64]
archive = "https://github.com/SolaceHarmony/emberharmony/releases/download/v1.0.0/emberharmony-linux-x64.tar.gz"
cmd = "./emberharmony"
args = ["acp"]

[agent_servers.emberharmony.targets.windows-x86_64]
archive = "https://github.com/SolaceHarmony/emberharmony/releases/download/v1.0.0/emberharmony-windows-x64.zip"
cmd = "./emberharmony.exe"
args = ["acp"]
