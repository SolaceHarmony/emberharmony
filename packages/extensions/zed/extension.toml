id = "code-harmony"
name = "CodeHarmony"
description = "The open source coding agent."
version = "1.0.0"
schema_version = 1
authors = ["The Solace Project"]
repository = "https://github.com/sydneyrenee/code-harmony"

[agent_servers.code-harmony]
name = "CodeHarmony"
icon = "./icons/code-harmony.svg"

[agent_servers.code-harmony.targets.darwin-aarch64]
archive = "https://github.com/sydneyrenee/code-harmony/releases/download/v1.0.0/code-harmony-darwin-arm64.zip"
cmd = "./code-harmony"
args = ["acp"]

[agent_servers.code-harmony.targets.darwin-x86_64]
archive = "https://github.com/sydneyrenee/code-harmony/releases/download/v1.0.0/code-harmony-darwin-x64.zip"
cmd = "./code-harmony"
args = ["acp"]

[agent_servers.code-harmony.targets.linux-aarch64]
archive = "https://github.com/sydneyrenee/code-harmony/releases/download/v1.0.0/code-harmony-linux-arm64.tar.gz"
cmd = "./code-harmony"
args = ["acp"]

[agent_servers.code-harmony.targets.linux-x86_64]
archive = "https://github.com/sydneyrenee/code-harmony/releases/download/v1.0.0/code-harmony-linux-x64.tar.gz"
cmd = "./code-harmony"
args = ["acp"]

[agent_servers.code-harmony.targets.windows-x86_64]
archive = "https://github.com/sydneyrenee/code-harmony/releases/download/v1.0.0/code-harmony-windows-x64.zip"
cmd = "./code-harmony.exe"
args = ["acp"]
